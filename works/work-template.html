<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>作品紹介 - [作品名]</title>
    <link rel="stylesheet" href="../assets/css/works.css?v=1.3">
    <link rel="icon" href="../assets/images/fav.png" type="image/png">
</head>

<body>

    <header>
        <h1>塩ポテト君 Portfolio</h1>
        
    <!-- Hamburger button -->
    <button class="hamburger-btn" aria-label="Menu" onclick="toggleMenu()">
      <span></span>
      <span></span>
      <span></span>
    </button>

    <nav>
            <ul>
                <li><a href="../index.html">トップページ</a></li>
                <li><a href="index.html?tab=game">ゲーム作品一覧</a></li>
                <li><a href="index.html?tab=program">プログラム作品一覧</a></li>
            </ul>
        </nav>
    </header>

  <!-- ===== メインコンテンツ ===== -->
  <main>
    <h1 class="article-title">[作品名]</h1>

    <section class="article-section meta">
      <div><strong>使用言語・ツール：</strong> Python / Unity / Blender</div>
      <div><strong>リリース日：</strong> 2025年10月25日</div>
    </section>

    <section class="article-section">
      <h2>作品紹介</h2>
      <p>
        ここに作品の概要や制作背景などを記載します。

      </p>

    </section>

    <section class="article-section">
      <h2>工夫点・技術的特徴</h2>
      <p>
        実装上工夫した点、独自システム、デザイン上のポイントなどを説明します。

    <section class="article-section links">

      <a href="https://github.com/username/project" target="_blank">GitHubソース</a>
      <a href="https://example.com/download" target="_blank">ダウンロードページ</a>
    </section>
  </main>

    <!-- フッター -->
    <footer>
        <p>© 2025 PotatoTimeKun. All Rights Reserved.</p>
    </footer>

  <script>
    function toggleMenu() {
      const nav = document.querySelector('nav');
      if(nav) nav.classList.toggle('active');
      const btn = document.querySelector('.hamburger-btn');
      if(btn) btn.classList.toggle('active');
    }
  </script>
